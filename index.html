<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Meets</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section id="login-screen" class="card login-card">
    <h1>Chat Meets</h1>

    <div class="form-row">
      <label>사용자 이름</label>
      <input id="login-username" type="text" placeholder="이름 입력" />
    </div>

    <button id="login-button" class="primary-button">
      로그인
    </button>

    <p id="login-message"></p>
  </section>

  <section id="dashboard-screen" style="display:none;">

    <div class="top-bar">
      <h2 id="user-welcome">안녕하세요</h2>
      <button id="logout-button" class="danger-button">
        로그아웃
      </button>
    </div>

    <p id="user-subtitle"></p>

    <main class="main-panel">

      <div id="chat-panel" class="page-panel active-panel">
        <div class="panel-card">

          <div class="panel-row">
            <h3>채팅방</h3>
          </div>

          <div id="room-list" class="list-group"></div>

          <div class="chat-view">
            <h4 id="active-room-name">
              채팅방을 선택하세요
            </h4>

            <p id="active-room-members"></p>

            <div id="chat-messages" class="message-window"></div>

            <div class="message-input-row">
              <input
                id="chat-input"
                type="text"
                placeholder="메시지 입력"
              />

              <button
                id="send-chat-button"
                class="primary-button"
              >
                전송
              </button>
            </div>
          </div>

        </div>
      </div>

      <div id="meeting-panel" class="page-panel hidden">
        <div class="panel-card">

          <div class="panel-row">
            <h3>회의 만들기</h3>

            <button
              id="create-meeting-button"
              class="secondary-button"
            >
              회의 생성
            </button>
          </div>

          <div class="form-row">
            <input
              id="meeting-title-input"
              type="text"
              placeholder="회의 제목"
            />
          </div>

          <div id="active-meeting-list" class="list-group"></div>

        </div>
      </div>

      <div id="friend-panel" class="page-panel hidden">
        <div class="panel-card">

          <h3>친구 검색</h3>

          <div class="message-input-row">
            <input
              id="friend-search-input"
              type="text"
              placeholder="친구 이름 검색"
            />

            <button
              id="friend-search-button"
              class="secondary-button"
            >
              검색
            </button>
          </div>

          <div id="search-results" class="list-group"></div>

        </div>
      </div>

    </main>

    <div class="bottom-nav">

      <button
        class="nav-item-bottom active-bottom"
        data-panel="chat-panel"
      >
        채팅
      </button>

      <button
        class="nav-item-bottom"
        data-panel="meeting-panel"
      >
        회의
      </button>

      <button
        class="nav-item-bottom"
        data-panel="friend-panel"
      >
        친구
      </button>

    </div>

  </section>

  <script src="app.js"></script>
</body>
</html>
